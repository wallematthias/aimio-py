name: Build Wheels

on:
  pull_request:
    branches: [ "main", "master" ]
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_wheels:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-13, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: buildenv
          python-version: ${{ matrix.python-version }}
          channels: conda-forge
          auto-activate-base: false

      - name: Log Runner Architecture
        shell: bash -l {0}
        run: |
          python - <<'PY'
          import platform
          print("platform.machine():", platform.machine())
          PY

      - name: Assert macOS Intel Runner
        if: matrix.os == 'macos-13'
        shell: bash -l {0}
        run: |
          python - <<'PY'
          import platform
          arch = platform.machine().lower()
          if arch != "x86_64":
              raise SystemExit(f"Expected x86_64 on macos-13, got: {arch}")
          print("Verified macos-13 runner arch:", arch)
          PY

      - name: Assert macOS ARM Runner
        if: matrix.os == 'macos-latest'
        shell: bash -l {0}
        run: |
          python - <<'PY'
          import platform
          arch = platform.machine().lower()
          if arch != "arm64":
              raise SystemExit(f"Expected arm64 on macos-latest, got: {arch}")
          print("Verified macos-latest runner arch:", arch)
          PY

      - name: Install build dependencies
        shell: bash -l {0}
        run: |
          conda install -y \
            boost-cpp \
            pybind11 \
            numpy \
            pip \
            setuptools \
            wheel
          python -m pip install --upgrade build

      - name: Build wheel
        shell: bash -l {0}
        run: |
          python -m build --wheel --no-isolation

      - name: Validate macOS Wheel Tag (x86_64)
        if: matrix.os == 'macos-13'
        shell: bash -l {0}
        run: |
          ls -1 dist/
          ls dist/*.whl | grep -E 'macosx_.*_x86_64\.whl$'

      - name: Validate macOS Wheel Tag (arm64)
        if: matrix.os == 'macos-latest'
        shell: bash -l {0}
        run: |
          ls -1 dist/
          ls dist/*.whl | grep -E 'macosx_.*_arm64\.whl$'

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ runner.arch }}-py${{ matrix.python-version }}
          path: ./dist/*.whl

  build_sdist:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist --outdir dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ./dist/*.tar.gz

  publish:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/p/aimio-py
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
