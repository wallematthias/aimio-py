name: Build Wheels

on:
  pull_request:
    branches: [ "main", "master" ]
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_wheels:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: manylinux-x86_64
            cibw_arch: x86_64
          - os: windows-latest
            artifact: windows-amd64
            cibw_arch: AMD64
          - os: macos-latest
            artifact: macos-arm64
            cibw_arch: arm64
          - os: macos-15-intel
            artifact: macos-x86_64
            cibw_arch: x86_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: |
          python -m pip install --upgrade pip cibuildwheel

      - name: Cache vcpkg artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: |
            C:\vcpkg\downloads
            C:\vcpkg\buildtrees
            C:\vcpkg\packages
            C:\vcpkg\installed
            C:\vcpkg\bincache
          key: ${{ runner.os }}-vcpkg-boost-x64-v1-${{ hashFiles('.github/workflows/build-wheels.yml') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-boost-x64-v1-

      - name: Build wheels (cibuildwheel)
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux_* *-manylinux_i686 *-win32"
          CIBW_ARCHS: ${{ matrix.cibw_arch }}
          CIBW_TEST_COMMAND: "python -c \"import py_aimio._aimio as _ext; print(_ext.__file__)\""
          CIBW_BUILD_VERBOSITY: "1"
          CIBW_BEFORE_ALL_LINUX: >-
            if command -v yum >/dev/null 2>&1; then yum install -y boost-devel;
            elif command -v dnf >/dev/null 2>&1; then dnf install -y boost-devel;
            elif command -v apt-get >/dev/null 2>&1; then apt-get update && apt-get install -y libboost-all-dev;
            else echo 'No supported package manager found for Boost install' && exit 1; fi
          CIBW_BEFORE_ALL_MACOS: >-
            brew install boost
          CIBW_ENVIRONMENT_MACOS: >-
            CPPFLAGS="-I$(brew --prefix boost)/include"
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >-
            python -m pip install delocate && delocate-wheel --require-archs {delocate_archs} -w {dest_dir} {wheel}
          CIBW_BEFORE_ALL_WINDOWS: >-
            powershell -NoProfile -ExecutionPolicy Bypass -Command "$ErrorActionPreference = 'Stop'; if (-not (Test-Path 'C:\vcpkg')) { git clone --depth 1 https://github.com/microsoft/vcpkg C:\vcpkg }; & C:\vcpkg\bootstrap-vcpkg.bat; & C:\vcpkg\vcpkg.exe install boost:x64-windows"
          CIBW_ENVIRONMENT_WINDOWS: >-
            VCPKG_ROOT=C:\vcpkg
            VCPKG_DEFAULT_BINARY_CACHE=C:\vcpkg\bincache
          CIBW_BEFORE_BUILD_WINDOWS: >-
            powershell -NoProfile -ExecutionPolicy Bypass -Command "$ErrorActionPreference = 'Stop'; Write-Host \"VCPKG_ROOT=$env:VCPKG_ROOT\"; if (-not (Test-Path \"$env:VCPKG_ROOT\\installed\\x64-windows\\include\\boost\\format.hpp\")) { throw 'boost/format.hpp not found under VCPKG_ROOT' }; if (-not (Test-Path \"$env:VCPKG_ROOT\\installed\\x64-windows\\include\\boost\\endian\\conversion.hpp\")) { throw 'boost/endian/conversion.hpp not found under VCPKG_ROOT' }"
        run: |
          python -m cibuildwheel --output-dir dist

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.artifact }}
          path: ./dist/*.whl

  build_sdist:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist --outdir dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ./dist/*.tar.gz

  publish:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/p/aimio-py
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Set up Python for debug tooling
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Debug artifact inventory
        run: |
          echo "Current dist/ contents:"
          ls -lah dist
          echo
          echo "Wheel files:"
          ls -1 dist/*.whl || true
          echo
          echo "Source distributions:"
          ls -1 dist/*.tar.gz || true

      - name: Debug wheel tags
        run: |
          python - <<'PY'
          from pathlib import Path
          wheels = sorted(Path("dist").glob("*.whl"))
          if not wheels:
              print("No wheels found in dist/")
          for w in wheels:
              print(w.name)
              if "linux_x86_64" in w.name and "manylinux" not in w.name and "musllinux" not in w.name:
                  raise SystemExit(f"Non-portable Linux wheel tag detected: {w.name}")
          PY

      - name: Twine check (debug)
        run: |
          python -m pip install --upgrade pip twine
          python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
