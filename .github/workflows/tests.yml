name: Tests

on:
  pull_request:
    branches: ["main", "master"]
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: testenv
          python-version: ${{ matrix.python-version }}
          channels: conda-forge
          auto-activate-base: false

      - name: Install dependencies
        shell: bash -l {0}
        run: |
          conda install -y \
            boost-cpp \
            pybind11 \
            numpy \
            pip \
            setuptools \
            wheel \
            pytest
          python -m pip install --upgrade pytest-cov
          python -m pip install -e . --no-build-isolation

      - name: Run tests
        shell: bash -l {0}
        run: |
          pytest -q

  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: covenv
          python-version: "3.11"
          channels: conda-forge
          auto-activate-base: false

      - name: Install dependencies
        shell: bash -l {0}
        run: |
          conda install -y \
            boost-cpp \
            pybind11 \
            numpy \
            pip \
            setuptools \
            wheel \
            pytest
          python -m pip install --upgrade pytest-cov
          python -m pip install -e . --no-build-isolation

      - name: Run tests with coverage
        shell: bash -l {0}
        run: |
          pytest -q --cov=py_aimio --cov-fail-under=90 --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
